services:
  rustfs:
    image: ${RUSTFS_IMAGE:-rustfs/rustfs:latest}
    container_name: hrd-room-service-rustfs
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_VOLUMES: /data
      RUSTFS_DEFAULT_BUCKETS: ${RUSTFS_BUCKET_NAME:-hrd-room-service}
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs_data:/data
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: hrd-room-service-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrd_room_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hrd_room_service}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: hrd-room-service-victorialogs
    ports:
      - "${VICTORIALOGS_PORT:-9428}:9428"
    volumes:
      - victorialogs_data:/victoria-logs-data
    command:
      - "--storageDataPath=/victoria-logs-data"
      - "--retentionPeriod=14d"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_TESTS: "true"
    container_name: hrd-room-service-app
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 5432
      OTEL_SERVICE_NAME: hrd-room-service
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://victorialogs:9428/insert/opentelemetry/v1/logs
    depends_on:
      db:
        condition: service_healthy
      rustfs:
        condition: service_started
      victorialogs:
        condition: service_started
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres_data:
  rustfs_data:
  victorialogs_data:
