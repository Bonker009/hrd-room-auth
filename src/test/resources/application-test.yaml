app:
  security:
    enabled: false
  rate-limit:
    enabled: false

rustfs:
  enabled: false

keycloak:
  auth:
    auth-server-url: http://localhost:0
    realm: test
    client-id: test
    client-secret: test

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

# Avoid OTLP export to VictoriaLogs during tests (no collector on localhost).
otel:
  logs:
    exporter: none
  metrics:
    exporter: none
  traces:
    exporter: none
