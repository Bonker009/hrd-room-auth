server:
  port: ${APP_PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: hrd-room-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hrd_room_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/assessment}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/assessment/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
  jwt:
    role-claim: realm_access.roles
    principal-claim: ${JWT_PRINCIPAL_CLAIM:sub}

keycloak:
  auth:
    auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:assessment}
    client-id: ${KEYCLOAK_CLIENT_ID:hrd-room-service}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
    http-connect-timeout: ${KEYCLOAK_HTTP_CONNECT_TIMEOUT:5s}
    http-read-timeout: ${KEYCLOAK_HTTP_READ_TIMEOUT:30s}

rustfs:
  enabled: ${RUSTFS_ENABLED:false}
  endpoint-url: ${RUSTFS_ENDPOINT_URL:}
  public-endpoint-url: ${RUSTFS_PUBLIC_ENDPOINT_URL:${RUSTFS_ENDPOINT_URL:}}
  bucket-name: ${RUSTFS_BUCKET_NAME:}
  access-key-id: ${RUSTFS_ACCESS_KEY_ID:}
  secret-access-key: ${RUSTFS_SECRET_ACCESS_KEY:}
  region: ${RUSTFS_REGION:us-east-1}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: docker
server:
  port: 8080
